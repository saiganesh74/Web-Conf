apiVersion: apps/v1

kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

        - name: backend

          image: chat-backend

          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: DB_HOST
              value: postgres-service

            - name: DB_USER
              value: postgres

            - name: DB_PASSWORD
              value: postgres

            - name: DB_NAME
              value: chatapp

            - name: DB_PORT
              value: "5432"

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"