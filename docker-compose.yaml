services:

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always

    ports:
      - "5000:5000"

    environment:
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: chatapp
      DB_PASSWORD: postgres
      DB_PORT: 5432

    depends_on:
      - db

  db:
    image: postgres:15
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatapp

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: